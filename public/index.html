<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0F0F14" />
  <meta name="description" content="Gestió familiar: menú, calendari, compra i tasques" />
  <title>FamilyHub</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FamilyHub" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='32' font-size='32'>🏡</text></svg>" />

  <style>
    * { touch-action: manipulation; }
    /* Tablet kiosk mode */
    @media (min-width: 768px) and (orientation: landscape) {
      body { user-select: none; -webkit-user-select: none; overflow: hidden; }
    }
    /* Splash screen */
    #splash {
      position: fixed; top: 0; right: 0; bottom: 0; left: 0; background: #0F0F14;
      display: -webkit-flex; display: flex;
      -webkit-flex-direction: column; flex-direction: column;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: center; justify-content: center;
      z-index: 9999; gap: 12px;
      -webkit-transition: opacity .4s ease; transition: opacity .4s ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div id="splash">
    <div style="font-size:56px">🏡</div>
    <div style="font-family:Georgia,serif;font-size:28px;font-weight:700;color:#F0F0F8;letter-spacing:-.02em">
      Family<span style="color:#FF6B35;font-style:italic">Hub</span>
    </div>
  </div>
  <div id="root"></div>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'))
    }
    // Hide splash once React loads
    window.addEventListener('load', () => {
      setTimeout(() => {
        const s = document.getElementById('splash')
        if (s) { s.classList.add('hidden'); setTimeout(() => s.remove(), 400) }
      }, 600)
    })
  </script>
</body>
</html>
